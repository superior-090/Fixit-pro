services:
  - type: web
    name: fixit-pro-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fixit-pro-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: fixit-pro-db
    plan: free
